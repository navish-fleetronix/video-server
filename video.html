<!DOCTYPE html>
<html>
<head>
    <title>Live Video</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; }
        video { width: 640px; margin: 10px; }
    </style>
</head>
<body>
    <h2>Live Video Stream</h2>
    <h3>Channel 1 - Front</h3>
    <video id="ch1" autoplay muted controls></video>
    <!-- <h3>Channel 2 - Rear</h3>
    <video id="ch2" autoplay muted controls></video> -->

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        function startPlayer(id, src) {
            const video = document.getElementById(id);
            const hls   = new Hls({ lowLatencyMode: true });
            hls.loadSource(src);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            hls.on(Hls.Events.ERROR, (e, d) => console.error(id, d));
        }

        startPlayer('ch1', '/public/ch1.m3u8');
        startPlayer('ch2', '/public/ch2.m3u8');
    </script>
</body>
</html>
