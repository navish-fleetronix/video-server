<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Camera</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #111; color: #fff; font-family: Arial; padding: 20px; margin: 0; }
        h3   { color: #00d4ff; }
        video { width: 100%; max-width: 900px; display: block; margin: 10px 0; background: #000; }
        .recordings { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th    { background: #222; padding: 8px; text-align: left; color: #00d4ff; }
        td    { padding: 8px; border-bottom: 1px solid #333; }
        tr:hover { background: #1a1a1a; cursor: pointer; }
        .btn  { background: #00d4ff; color: #000; border: none; padding: 6px 14px;
                border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #00aacc; }
        .live-badge { background: #f00; color: #fff; padding: 2px 8px;
                      border-radius: 4px; font-size: 11px; margin-left: 8px; }
        .info-box { background: #222; padding: 10px; border-radius: 6px;
                    font-size: 13px; border-left: 3px solid #00d4ff; }
        #map { height: 400px; border-radius: 8px; border: 1px solid #333; }
        #gpsInfo { background: #1a1a1a; padding: 15px; border-radius: 8px;
                   display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; 
                   margin-top: 15px; }
    </style>
</head>
<body>

  <!-- Live Video -->
  <div>
    <h3>Channel 1 - Front <span class="live-badge">LIVE</span></h3>
    <video id="ch1" autoplay muted controls></video>
  </div>

  <!-- Map -->
  <h3>Vehicle Location</h3>
  <div id="map"></div>

  <!-- GPS Info -->
  <div id="gpsInfo">
    <div class="info-box" id="info-lat">Latitude: --</div>
    <div class="info-box" id="info-lon">Longitude: --</div>
    <div class="info-box" id="info-speed">Speed: --</div>
    <div class="info-box" id="info-dir">Direction: --</div>
    <div class="info-box" id="info-elev">Elevation: --</div>
    <div class="info-box" id="info-dt">DateTime: --</div>
    <div class="info-box" id="info-acc">ACC: --</div>
    <div class="info-box" id="info-located">Located: --</div>
    <div class="info-box" id="info-mileage">Mileage: --</div>
    <div class="info-box" id="info-voltage">Voltage: --</div>
    <div class="info-box" id="info-satellites">Satellites: --</div>
    <div class="info-box" id="info-alarms">Alarms: --</div>
  </div>

  <!-- Recordings -->
  <div class="recordings">
    <h3>📹 Saved Recordings</h3>

    <div style="margin-bottom:12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
  <label style="color:#aaa; font-size:13px;">From:</label>
  <input type="datetime-local" id="searchFrom" style="background:#222; color:#fff; border:1px solid #444;
         padding:6px 10px; border-radius:4px; font-size:13px;" />
  <label style="color:#aaa; font-size:13px;">To:</label>
  <input type="datetime-local" id="searchTo" style="background:#222; color:#fff; border:1px solid #444;
         padding:6px 10px; border-radius:4px; font-size:13px;" />
  <button class="btn" onclick="fetchRecordings()">🔍 Search</button>
  <button class="btn" style="background:#444; color:#fff;" onclick="clearSearch()">✖ Clear</button>
  <button class="btn" style="background:#27ae60;" onclick="saveRecording()">💾 Save Recording</button>
  <span id="searchStatus" style="color:#888; font-size:12px;"></span>
</div>

    <table>
      <thead>
        <tr>
          <th>Channel</th>
          <th>Start Time</th>
          <th>End Time</th>
          <th>Size</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="recordingList">
        <tr><td colspan="5" style="color:#666">Waiting for recordings...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Playback -->
  <div id="playbackSection" style="display:none; margin-top:20px;">
    <h3>Playback</h3>
    <video id="playback" controls style="width:640px; background:#000;"></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Live stream ───────────────────────────────────────────────────────
    function startLive(videoId, src) {
        const video = document.getElementById(videoId);
        const hls   = new Hls({ lowLatencyMode: true });
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        hls.on(Hls.Events.ERROR, (e, d) => console.error(videoId, d));
    }

    startLive('ch1', '/public/ch1.m3u8');

    // ── Leaflet Map ───────────────────────────────────────────────────────
    const map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const truckIcon = L.divIcon({
    html: `<div style="
        background: #00d4ff;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 3px solid #fff;
        box-shadow: 0 0 8px #00d4ff;
    "></div>`,
    iconSize:   [20, 20],
    iconAnchor: [10, 10],
    className:  ''
});

    let marker   = null;
    let polyline = null;
    let trail    = []; // store last 50 positions

    function updateMap(lat, lon, speed, direction) {
        const pos = [lat, lon];

        if (!marker) {
            // First position — create marker and center map
            marker = L.marker(pos, { icon: truckIcon }).addTo(map);
            map.setView(pos, 15);
        } else {
            marker.setLatLng(pos);
        }

        // Update popup
        marker.bindPopup(`
            <b>Vehicle</b><br>
            Lat: ${lat.toFixed(6)}<br>
            Lon: ${lon.toFixed(6)}<br>
            Speed: ${speed} km/h<br>
            Direction: ${direction}°
        `);

        // Draw trail (last 50 points)
        trail.push(pos);
        if (trail.length > 50) trail.shift();

        if (polyline) map.removeLayer(polyline);
        polyline = L.polyline(trail, { color: '#00d4ff', weight: 2 }).addTo(map);

        // Keep map centered on vehicle
        map.panTo(pos);
    }

    // ── WebSocket ─────────────────────────────────────────────────────────
    const ws = new WebSocket(`ws://${location.hostname}:8801`);
    ws.onopen  = () => console.log('WS connected');
    ws.onerror = e => console.error('WS error', e);

    // ── WebSocket receive ─────────────────────────────────────────────────────
    ws.onopen  = () => {
        console.log('[WS] Connected to server');
        // Auto-fetch today on connect
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('searchFrom').value = today;
        document.getElementById('searchTo').value   = today;
        fetchRecordings();
    };

    ws.onclose = () => console.warn('[WS] Disconnected');
    ws.onerror = e  => console.error('[WS] Error:', e);

    ws.onmessage = e => {
        let msg;
        try { msg = JSON.parse(e.data); }
        catch(err) { console.error('[WS] Bad JSON:', e.data); return; }

        console.log('[WS] Received type:', msg.type);

        if (msg.type === 'location') {
            updateMap(msg.lat, msg.lon, msg.speed, msg.direction);
            document.getElementById('info-lat').textContent        = `Latitude: ${msg.lat.toFixed(6)}`;
            document.getElementById('info-lon').textContent        = `Longitude: ${msg.lon.toFixed(6)}`;
            document.getElementById('info-speed').textContent      = `Speed: ${msg.speed} km/h`;
            document.getElementById('info-dir').textContent        = `Direction: ${msg.direction}°`;
            document.getElementById('info-elev').textContent       = `Elevation: ${msg.elevation} m`;
            document.getElementById('info-dt').textContent         = `DateTime: ${msg.datetime}`;
            document.getElementById('info-acc').textContent        = `ACC: ${msg.accOn ? 'ON' : 'OFF'}`;
            document.getElementById('info-located').textContent    = `Located: ${msg.located ? 'Yes' : 'No'}`;
            document.getElementById('info-mileage').textContent    = `Mileage: ${msg.mileage || '--'}`;
            document.getElementById('info-voltage').textContent    = `Voltage: ${msg.voltage || '--'}`;
            document.getElementById('info-satellites').textContent = `Satellites: ${msg.satellites || '--'}`;
            document.getElementById('info-alarms').textContent     = `Alarms: ${msg.alarms.length ? msg.alarms.join(', ') : 'None'}`;
        }

        if (msg.type === 'recordings') {
            console.log('[WS] recordings received, count:', msg.data ? msg.data.length : 0);
            showRecordings(msg.data);
        }

        if (msg.type === 'playback_url') {
            console.log('[WS] playback_url:', msg.url);
            startPlayback(msg.url);
        }

        if (msg.type === 'playback_error') {
            console.warn('[WS] playback_error:', msg.message);
            document.getElementById('searchStatus').textContent = '❌ ' + msg.message;
        }
        if (msg.type === 'save_ok')       document.getElementById('searchStatus').textContent = '📤 ' + msg.message;
        if (msg.type === 'save_complete') document.getElementById('searchStatus').textContent = '✅ ' + msg.message;
        if (msg.type === 'save_error')    document.getElementById('searchStatus').textContent = '❌ ' + msg.message;
    };
// ── Recordings: request from server ──────────────────────────────────────
    function fetchRecordings() {
        const from   = document.getElementById('searchFrom').value;
        const to     = document.getElementById('searchTo').value;
        const status = document.getElementById('searchStatus');
        console.log('[Rec] fetchRecordings() from:', from, 'to:', to, 'ws.readyState:', ws.readyState);

        if (ws.readyState !== WebSocket.OPEN) {
            console.warn('[Rec] WS not open, state:', ws.readyState);
            status.textContent = '❌ Not connected';
            return;
        }
        const payload = { type: 'query_recordings', startDate: from || null, endDate: to || null };
        console.log('[Rec] Sending:', JSON.stringify(payload));
        ws.send(JSON.stringify(payload));
        status.textContent = '⏳ Loading...';
    }

    function clearSearch() {
        document.getElementById('searchFrom').value = '';
        document.getElementById('searchTo').value   = '';
        document.getElementById('searchStatus').textContent = '';
        console.log('[Rec] clearSearch — fetching all');
        fetchRecordings();
    }

    function showRecordings(list) {
        console.log('[Rec] showRecordings() count:', list ? list.length : 0);
        const tbody  = document.getElementById('recordingList');
        const status = document.getElementById('searchStatus');

        if (!list || list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="color:#666">No recordings found</td></tr>';
            if (status) status.textContent = '⚠️ No recordings found';
            return;
        }

        if (status) status.textContent = `✅ ${list.length} recording(s)`;
        window._recordings = list;

        // Group by date
        const grouped = {};
        list.forEach((r, i) => {
            const date = r.startTime.split(' ')[0];
            if (!grouped[date]) grouped[date] = [];
            grouped[date].push({ ...r, index: i });
        });

        let html = '';
        Object.keys(grouped).sort().reverse().forEach(date => {
            html += `<tr><td colspan="5" style="background:#222; color:#00d4ff;
                font-weight:bold; padding:10px;">📅 ${date}</td></tr>`;
            grouped[date].forEach(r => {
                const startT = r.startTime.split(' ')[1] || '--';
                const endT   = r.endTime   ? r.endTime.split(' ')[1] : '--';
                html += `
                    <tr>
                        <td>CH${r.ch}</td>
                        <td>${startT}</td>
                        <td>${endT}</td>
                        <td>${(r.size / 1024).toFixed(1)} KB</td>
                        <td>
                            <button class="btn" onclick="playRecording(${r.index})">▶ Play</button>
                        </td>
                    </tr>`;
            });
        });
        tbody.innerHTML = html;
        console.log('[Rec] Table rendered, groups:', Object.keys(grouped));
    }

    // ── Playback ──────────────────────────────────────────────────────────────
    function playRecording(index) {
        const rec = window._recordings && window._recordings[index];
        if (!rec) { console.error('[Play] No recording at index', index); return; }

        console.log('[Play] playRecording() index:', index, 'rec:', JSON.stringify(rec));

        if (ws.readyState !== WebSocket.OPEN) {
            console.warn('[Play] WS not open');
            return;
        }

        const payload = { type: 'playback_request', channel: rec.ch, startTime: rec.startTime, endTime: rec.endTime };
        console.log('[Play] Sending playback_request:', JSON.stringify(payload));
        ws.send(JSON.stringify(payload));
        document.getElementById('searchStatus').textContent = '⏳ Loading playback...';
    }
function saveRecording() {
    const from = document.getElementById('searchFrom').value;
    const to   = document.getElementById('searchTo').value;
    const status = document.getElementById('searchStatus');

    if (!from || !to) { status.textContent = '❌ Select start and end date/time'; return; }
    if (ws.readyState !== WebSocket.OPEN) { status.textContent = '❌ Not connected'; return; }

    // Convert datetime-local value ("2025-01-15T10:30") → "2025-01-15 10:30:00"
    const fmt = v => v.replace('T', ' ') + ':00';

    ws.send(JSON.stringify({
        type: 'save_recording',
        channel: 1,
        startTime: fmt(from),
        endTime:   fmt(to),
    }));
    status.textContent = '⏳ Sending save command to device...';
}
    function startPlayback(url) {
        console.log('[Play] startPlayback() url:', url);
        const section = document.getElementById('playbackSection');
        section.style.display = 'block';
        section.scrollIntoView({ behavior: 'smooth' });

        const video = document.getElementById('playback');

        if (window._playbackHls) {
            console.log('[Play] Destroying previous HLS instance');
            window._playbackHls.destroy();
            window._playbackHls = null;
        }

        if (Hls.isSupported()) {
            const hls = new Hls();
            window._playbackHls = hls;
            hls.on(Hls.Events.ERROR,           (e, d) => console.error('[Play][HLS] Error:', d.type, d.details));
            hls.on(Hls.Events.MANIFEST_PARSED, ()     => {
                console.log('[Play][HLS] Manifest parsed, playing');
                video.play().catch(err => console.warn('[Play] play() blocked:', err));
            });
            hls.loadSource(url);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari native HLS
            video.src = url;
            video.play().catch(err => console.warn('[Play] Safari play() blocked:', err));
        } else {
            console.error('[Play] HLS not supported in this browser');
        }
    }
  </script>
</body>
</html>
