<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Camera</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { background: #111; color: #fff; font-family: Arial; padding: 20px; margin: 0; }
        h3   { color: #00d4ff; margin: 16px 0 8px; }

        /* ── Video grid ── */
        #devices {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .device-card {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #333;
        }
        .device-card h3 { margin-top: 0; }
        video {
            width: 100%;
            display: block;
            background: #000;
            border-radius: 4px;
        }
        .live-badge {
            background: #f00; color: #fff; padding: 2px 8px;
            border-radius: 4px; font-size: 11px; margin-left: 8px;
            animation: blink 1.2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── Map ── */
        #map { height: 400px; border-radius: 8px; border: 1px solid #333; margin-bottom: 16px; }

        /* ── GPS info panel ── */
        #gpsInfo {
            background: #1a1a1a; padding: 15px; border-radius: 8px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
        }
        .info-box {
            background: #222; padding: 10px; border-radius: 6px;
            font-size: 13px; border-left: 3px solid #00d4ff;
        }
        #info-panel-title { color: #aaa; font-size: 12px; margin-bottom: 4px; }
    </style>
</head>
<body>

<!-- Video players — one card added per device as it connects -->
<h3>Live Cameras</h3>
<div id="devices">
    <p id="no-devices" style="color:#555; font-size:13px;">Waiting for devices to connect…</p>
</div>

<!-- Map — all devices shown simultaneously -->
<h3>Vehicle Locations</h3>
<div id="map"></div>

<!-- GPS info — updates for whichever device sent the most recent packet -->
<div id="info-panel-title">Last update: —</div>
<div id="gpsInfo">
    <div class="info-box" id="info-phone">Device: --</div>
    <div class="info-box" id="info-lat">Latitude: --</div>
    <div class="info-box" id="info-lon">Longitude: --</div>
    <div class="info-box" id="info-speed">Speed: --</div>
    <div class="info-box" id="info-dir">Direction: --</div>
    <div class="info-box" id="info-elev">Elevation: --</div>
    <div class="info-box" id="info-dt">DateTime: --</div>
    <div class="info-box" id="info-acc">ACC: --</div>
    <div class="info-box" id="info-located">Located: --</div>
    <div class="info-box" id="info-mileage">Mileage: --</div>
    <div class="info-box" id="info-voltage">Voltage: --</div>
    <div class="info-box" id="info-satellites">Satellites: --</div>
    <div class="info-box" id="info-alarms">Alarms: --</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// ── Leaflet Map ───────────────────────────────────────────────────────────────
const map = L.map('map').setView([20, 78], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Per-device map state: { marker, polyline, trail }
const deviceMapState = {};

function makeIcon(phone) {
    return L.divIcon({
        html: `<div style="
            background:#00d4ff; width:24px; height:24px; border-radius:50%;
            border:3px solid #fff; box-shadow:0 0 8px #00d4ff;
            display:flex; align-items:center; justify-content:center;
            font-size:7px; color:#000; font-weight:bold; line-height:1;
        ">${phone.slice(-4)}</div>`,
        iconSize: [24, 24], iconAnchor: [12, 12], className: ''
    });
}

function updateMap(phone, lat, lon, speed, direction) {
    const pos = [lat, lon];

    if (!deviceMapState[phone]) {
        deviceMapState[phone] = {
            marker:   L.marker(pos, { icon: makeIcon(phone) }).addTo(map),
            polyline: null,
            trail:    [],
        };
        map.setView(pos, 15);
    }

    const s = deviceMapState[phone];
    s.marker.setLatLng(pos);
    s.marker.bindPopup(
        `<b>${phone}</b><br>` +
        `Lat: ${lat.toFixed(6)}<br>` +
        `Lon: ${lon.toFixed(6)}<br>` +
        `Speed: ${speed} km/h<br>` +
        `Dir: ${direction}°`
    );

    s.trail.push(pos);
    if (s.trail.length > 50) s.trail.shift();
    if (s.polyline) map.removeLayer(s.polyline);
    s.polyline = L.polyline(s.trail, { color: '#00d4ff', weight: 2 }).addTo(map);
    map.panTo(pos);
}

// ── Live video players ────────────────────────────────────────────────────────
const hlsPlayers = {};  // { [phone]: Hls instance or true for native }

let _playerStartIndex = 0;

function ensureVideoPlayer(phone) {
    if (hlsPlayers[phone]) return;

    // Mark as initializing immediately so duplicate calls are ignored
    hlsPlayers[phone] = 'pending';

    const placeholder = document.getElementById('no-devices');
    if (placeholder) placeholder.remove();

    const card = document.createElement('div');
    card.className = 'device-card';
    card.id = `device-${phone}`;
    card.innerHTML = `
        <h3>📷 ${phone} — Ch1 <span class="live-badge">LIVE</span></h3>
        <video id="vid-${phone}" autoplay muted controls></video>
    `;
    document.getElementById('devices').appendChild(card);

    // Stagger each player by 800ms so they don't all hammer the server at once
    const delay = _playerStartIndex * 800;
    _playerStartIndex++;

    setTimeout(() => {
        const video = document.getElementById(`vid-${phone}`);
        if (!video) return;

        const src = `/public/${phone}/video1.m3u8`;

        if (Hls.isSupported()) {
            const hls = new Hls({
                lowLatencyMode:       true,
                maxBufferLength:      10,
                maxMaxBufferLength:   20,
                liveSyncDurationCount: 2,
                liveMaxLatencyDurationCount: 4,
            });
            hls.loadSource(src);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            hls.on(Hls.Events.ERROR, (e, d) => {
                if (d.fatal) {
                    console.error(`[HLS ${phone}]`, d);
                    // Auto-recover on fatal errors
                    if (d.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        hls.startLoad();
                    } else if (d.type === Hls.ErrorTypes.MEDIA_ERROR) {
                        hls.recoverMediaError();
                    }
                }
            });
            hlsPlayers[phone] = hls;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = src;
            video.play();
            hlsPlayers[phone] = true;
        }
    }, delay);
}
// ── WebSocket ─────────────────────────────────────────────────────────────────
const ws = new WebSocket(`ws://${location.hostname}:8801`);
ws.onopen  = () => console.log('[WS] Connected');
ws.onclose = () => console.warn('[WS] Disconnected');
ws.onerror = e  => console.error('[WS] Error:', e);

ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch(err) { return; }

    if (msg.type === 'device_connected') {
        ensureVideoPlayer(msg.phone);
        return;
    }

    if (msg.type === 'location') {
        const phone = msg.phone;
        ensureVideoPlayer(phone);

        // Update map marker / trail
        updateMap(phone, msg.lat, msg.lon, msg.speed, msg.direction);

        // Update GPS info panel (always shows the most recent device's data)
        document.getElementById('info-panel-title').textContent = `Last update: ${phone} @ ${msg.datetime}`;
        document.getElementById('info-phone').textContent       = `Device: ${phone}`;
        document.getElementById('info-lat').textContent         = `Latitude: ${msg.lat.toFixed(6)}`;
        document.getElementById('info-lon').textContent         = `Longitude: ${msg.lon.toFixed(6)}`;
        document.getElementById('info-speed').textContent       = `Speed: ${msg.speed} km/h`;
        document.getElementById('info-dir').textContent         = `Direction: ${msg.direction}°`;
        document.getElementById('info-elev').textContent        = `Elevation: ${msg.elevation} m`;
        document.getElementById('info-dt').textContent          = `DateTime: ${msg.datetime}`;
        document.getElementById('info-acc').textContent         = `ACC: ${msg.accOn ? 'ON' : 'OFF'}`;
        document.getElementById('info-located').textContent     = `Located: ${msg.located ? 'Yes' : 'No'}`;
        document.getElementById('info-mileage').textContent     = `Mileage: ${msg.mileage || '--'}`;
        document.getElementById('info-voltage').textContent     = `Voltage: ${msg.voltage || '--'}`;
        document.getElementById('info-satellites').textContent  = `Satellites: ${msg.satellites || '--'}`;
        document.getElementById('info-alarms').textContent      = `Alarms: ${msg.alarms && msg.alarms.length ? msg.alarms.join(', ') : 'None'}`;
    }
};

</script>
</body>
</html>
